<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f7fb" />
    <title>LumeDAV</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="login" class="auth">
      <form id="loginForm">
        <img src="/lumedav-logo.png" />
        <h1>欢迎使用 LumeDAV</h1>
        <p>登录你的私人文件空间</p>
        <label
          >用户名<input
            id="user"
            value="admin"
            autocomplete="username" /></label
        ><label
          >密码<input
            id="pass"
            type="password"
            autocomplete="current-password" /></label
        ><button>登录</button><em id="loginError"></em>
      </form>
    </div>
    <div id="register" class="auth hidden">
      <form id="registerForm">
        <img src="/lumedav-logo.png" />
        <h1>创建访问账号</h1>
        <p>使用管理员发出的邀请加入文件空间</p>
        <label>用户名<input id="regUser" autocomplete="username" /></label
        ><label
          >密码<input
            id="regPass"
            type="password"
            autocomplete="new-password" /></label
        ><button>完成注册</button><em id="regError"></em>
      </form>
    </div>
    <div id="app" class="shell hidden">
      <header class="topbar">
        <button id="menuToggle" class="iconBtn">☰</button>
        <div class="wordmark">
          <img src="/lumedav-logo.png" /><b>LumeDAV</b
          ><span id="webVersion" class="webVersion"></span>
        </div>
        <div class="topSearch">
          <span>⌕</span><input id="search" placeholder="搜索文件和文件夹" />
        </div>
        <div class="userDot">●</div>
      </header>
      <aside id="sidebar">
        <div class="sideTitle">文件空间</div>
        <nav>
          <button class="active" data-view="files">
            <span>▦</span>我的文件</button
          ><button data-view="trash"><span>♲</span>回收站</button>
        </nav>
        <div class="treeTitle">
          <b>目录树</b><button id="treeRefresh">↻</button>
        </div>
        <div id="tree" class="tree"></div>
        <div class="sideFoot">
          <span>标准 WebDAV</span><button id="davBtn">复制连接地址</button>
        </div>
      </aside>
      <main class="workspace">
        <div class="pageHead">
          <div>
            <div id="crumbs" class="crumbs"></div>
            <h1 id="pageTitle">我的文件</h1>
          </div>
          <div class="headActions">
            <label class="upload"
              ><input id="upload" type="file" multiple />＋ 上传</label
            ><button id="newFolder">新建文件夹</button>
          </div>
        </div>
        <div class="toolbar">
          <div>
            <button id="backBtn" disabled title="已经在最上层">
              <span aria-hidden="true">←</span
              ><span class="backLabel">返回上一级</span></button
            ><button id="refreshBtn">↻ 刷新</button
            ><button id="selectBtn">□ 选择</button>
          </div>
          <div>
            <select id="sort">
              <option value="name">名称排序</option>
              <option value="time">修改时间</option>
              <option value="size">文件大小</option>
            </select>
            <div class="viewSwitch">
              <button id="gridView" class="active">▦</button
              ><button id="listView">☷</button>
            </div>
          </div>
        </div>
        <section id="filePanel" class="filePanel gridMode">
          <div class="listHeader">
            <span>名称</span><span>大小</span><span>类型</span
            ><span>修改时间</span><span></span>
          </div>
          <div id="files" class="files"></div>
          <div id="empty" class="empty hidden">
            <div>▱</div>
            <h2>这里还没有文件</h2>
            <p>上传文件或新建一个文件夹</p>
          </div>
          <div id="loadMoreWrap" class="loadMore hidden">
            <button id="loadMore">加载更多文件</button
            ><span id="loadHint"></span>
          </div>
        </section>
        <footer>
          <span id="itemCount">0 个项目</span
          ><span>安全地存储在你的设备中</span>
        </footer>
      </main>
      <div id="toast" class="toast"></div>
    </div>
    <div id="menu" class="context hidden">
      <button data-act="preview">预览</button
      ><button data-act="download">下载</button
      ><button data-act="rename">重命名</button
      ><button data-act="restore">恢复</button
      ><button data-act="delete" class="danger">移入回收站</button>
    </div>
    <div id="archiveDialog" class="archiveDialog hidden">
      <div class="archiveCard">
        <header>
          <div><span>ZIP</span><b id="archiveTitle">文件夹打包下载</b></div>
          <button id="archiveClose" aria-label="关闭">×</button>
        </header>
        <section>
          <div id="archiveState" class="archiveState">准备任务…</div>
          <p id="archiveMessage">正在创建安全的下载任务</p>
          <div class="archiveProgress"><i id="archiveBar"></i></div>
          <div class="archiveStats">
            <span id="archiveFiles">0 个文件</span>
            <span id="archiveSize">0 B</span>
            <span id="archivePercent">0%</span>
          </div>
          <div class="archiveActions">
            <button id="archiveCancel">取消任务</button>
            <button id="archiveDownload" class="primary hidden">
              开始下载
            </button>
          </div>
          <small>大文件夹会在本机临时打包，传输完成后自动清理。</small>
        </section>
      </div>
    </div>
    <div id="downloadDialog" class="archiveDialog hidden">
      <div class="archiveCard">
        <header>
          <div><span>FILE</span><b id="downloadTitle">文件下载</b></div>
          <button id="downloadClose" aria-label="关闭">×</button>
        </header>
        <section>
          <div id="downloadState" class="archiveState">准备下载…</div>
          <p id="downloadMessage">正在连接文件</p>
          <div class="archiveProgress"><i id="downloadBar"></i></div>
          <div class="archiveStats">
            <span id="downloadTransferred">0 B</span>
            <span id="downloadTotal">大小未知</span>
            <span id="downloadSpeed">0 B/s</span>
          </div>
          <div class="archiveActions">
            <button id="downloadCancel">取消下载</button>
            <button id="downloadDone" class="primary hidden">关闭</button>
          </div>
          <small>下载完成后，浏览器会自动保存文件。</small>
        </section>
      </div>
    </div>
    <div id="preview" class="preview hidden">
      <div>
        <header>
          <b id="previewName"></b><button id="closePreview">×</button>
        </header>
        <section id="previewBody"></section>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
