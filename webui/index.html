<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#080c19" />
    <title>LumeDAV</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="register" class="login hidden">
      <div class="glow"></div>
      <form id="registerForm">
        <img class="logo" src="/lumedav-logo.png" /><small
          >INVITED REGISTRATION</small
        >
        <h1>创建访问账号</h1>
        <p>使用管理员发出的邀请加入 LumeDAV</p>
        <label>用户名<input id="regUser" autocomplete="username" /></label
        ><label
          >密码<input
            id="regPass"
            type="password"
            autocomplete="new-password" /></label
        ><button>完成注册 <b>→</b></button><em id="regError"></em
        ><span>ONE-TIME SECURE INVITATION</span>
      </form>
    </div>
    <div id="login" class="login">
      <div class="glow"></div>
      <form id="loginForm">
        <img class="logo" src="/lumedav-logo.png" alt="LumeDAV" /><small
          >WELCOME TO</small
        >
        <h1>LumeDAV</h1>
        <p>登录你的私人文件空间</p>
        <label
          >用户名<input
            id="user"
            autocomplete="username"
            value="admin" /></label
        ><label
          >密码<input
            id="pass"
            type="password"
            autocomplete="current-password" /></label
        ><button>进入空间 <b>→</b></button><em id="loginError"></em
        ><span>SECURE · PRIVATE · LIGHTWEIGHT</span>
      </form>
    </div>
    <div id="app" class="app hidden">
      <aside>
        <div class="brand">
          <img class="logo" src="/lumedav-logo.png" alt="" /><b>LumeDAV</b>
        </div>
        <nav>
          <button class="active" data-view="files">
            ◈<span>所有文件</span></button
          ><button data-view="trash">♲<span>回收站</span></button
          ><button id="davBtn">◇<span>连接 WebDAV</span></button>
        </nav>
        <div class="quota">
          <small>PRIVATE SPACE</small>
          <p>文件只保留在你的设备中</p>
        </div>
      </aside>
      <main>
        <header>
          <div>
            <small>MY SPACE</small>
            <h1 id="pageTitle">所有文件</h1>
          </div>
          <div class="actions">
            <label class="upload"
              ><input id="upload" type="file" multiple />＋ 上传文件</label
            ><button id="newFolder">新建文件夹</button>
          </div>
        </header>
        <section class="stats">
          <div><small>在线会话</small><b id="sOnline">0</b></div>
          <div><small>运行时间</small><b id="sUptime">—</b></div>
          <div><small>请求次数</small><b id="sRequests">0</b></div>
          <div><small>传输流量</small><b id="sTraffic">0 B</b></div>
        </section>
        <div class="toolbar">
          <div id="crumbs" class="crumbs"></div>
          <input id="search" placeholder="搜索文件…" /><select id="sort">
            <option value="name">按名称</option>
            <option value="time">按时间</option>
            <option value="size">按大小</option>
          </select>
        </div>
        <section class="panel">
          <div class="tableHead">
            <span>名称</span><span>大小</span><span>修改时间</span><span></span>
          </div>
          <div id="files" class="files"></div>
          <div id="empty" class="empty hidden">
            <div>◇</div>
            <h2>这里很安静</h2>
            <p>上传文件，或创建第一个文件夹</p>
          </div>
        </section>
      </main>
      <div id="toast" class="toast"></div>
    </div>
    <div id="menu" class="menu hidden">
      <button data-act="preview">预览</button
      ><button data-act="download">下载</button
      ><button data-act="rename">重命名</button
      ><button data-act="restore">恢复</button
      ><button data-act="delete" class="red">移入回收站</button>
    </div>
    <div id="preview" class="preview hidden">
      <div>
        <header>
          <b id="previewName"></b><button id="closePreview">×</button>
        </header>
        <section id="previewBody"></section>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
